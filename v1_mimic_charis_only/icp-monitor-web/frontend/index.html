<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ICP Monitor — Clinical Decision Support</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <meta name="description" content="Intracranial pressure classification and monitoring — clinical research prototype" />
    <!-- Dark mode FOUC prevention: apply class before React renders -->
    <script>
      ;(function () {
        try {
          var stored = JSON.parse(localStorage.getItem('icp-monitor-store') || '{}')
          var isDark = stored.state && stored.state.isDark != null
            ? stored.state.isDark
            : window.matchMedia('(prefers-color-scheme: dark)').matches
          if (isDark) document.documentElement.classList.add('dark')
        } catch (_) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
